name: pull_cleanup
description: Verify pull cleans up deleted remote entries from catalog state
setup:
  bigQuery:
    datasets:
      - id: p:d
        datasetReference:
          projectId: p
          datasetId: d
        location: us
  catalog:
    entryTypes:
      - name: projects/dataplex-types/locations/global/entryTypes/bigquery-dataset
    aspectTypes:
      - name: projects/dataplex-types/locations/global/aspectTypes/overview
    entries:
      - name: projects/p/locations/us/entryGroups/@bigquery/entries/bigquery.googleapis.com/projects/p/datasets/d
        entryType: projects/dataplex-types/locations/global/entryTypes/bigquery-dataset
        aspects:
          dataplex-types.global.overview:
            aspectType: projects/dataplex-types/locations/global/aspectTypes/overview
            data:
              content: Base description
              contentType: MARKDOWN

  fileSystem:
    catalog.yaml: |
      scope: bq-dataset.p.d
      snapshot:
        entries:
          - dataplex-types.global.bigquery-dataset
        aspects:
          - dataplex-types.global.overview
    catalog/p.d.yaml: |
      name: p.d
      type: dataplex-types.global.bigquery-dataset
    catalog/p.d_orphaned.yaml: |
      name: p.d_orphaned
      type: dataplex-types.global.bigquery-dataset
    catalog-state.json: |
      {
        "version": "1",
        "entries": {
          "p.d": {
            "entryChecksum": "abc123old",
            "lastSyncTime": "2026-06-03T00:00:00.000Z",
            "aspects": {}
          },
          "p.d_orphaned": {
            "entryChecksum": "def456old",
            "lastSyncTime": "2026-06-03T00:00:00.000Z",
            "aspects": {}
          }
        }
      }

actions:
  - action: pull
  - action: status
    assert:
      modified: false
      changes:
        - name: p.d
          status: Unchanged

assert:
  fileSystem:
    catalog-state.json:
      - contains: "p.d"
    catalog/p.d.yaml:
      - contains: "name: p.d"
    catalog/p.d_orphaned.yaml: null
